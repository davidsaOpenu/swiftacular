---
# Apply Swift patches and install BlueStore backend files

# Install BlueStore backend files directly (no patching)
- name: Install BlueStore backend files
  hosts: storage
  become: true
  tasks:
    - name: Copy bs_diskfile.py to Swift obj directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/swift_patches/obj/bs_diskfile.py"
        dest: /usr/lib/python3.9/site-packages/swift/obj/bs_diskfile.py
        mode: "0644"
        owner: root
        group: root
      when: swift_backend is defined and swift_backend == 'bs'

    - name: Copy bs_server.py to Swift obj directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/swift_patches/obj/bs_server.py"
        dest: /usr/lib/python3.9/site-packages/swift/obj/bs_server.py
        mode: "0644"
        owner: root
        group: root
      when: swift_backend is defined and swift_backend == 'bs'

    - name: Register bs_object entry point
      ansible.builtin.lineinfile:
        path: /usr/lib/python3.9/site-packages/swift-2.35.0.dist-info/entry_points.txt
        insertafter: "^\\[paste\\.app_factory\\]"
        line: "bs_object = swift.obj.bs_server:app_factory"
        state: present
      when: swift_backend is defined and swift_backend == 'bs'

    - name: Display BlueStore backend installation status
      ansible.builtin.debug:
        msg: "✓ BlueStore backend files installed: bs_diskfile.py, bs_server.py, entry point registered"
      when: swift_backend is defined and swift_backend == 'bs'

# Install patch utility on all nodes
- name: Install patch utility
  hosts: all
  become: true
  tasks:
    - name: Install patch package
      ansible.builtin.dnf:
        name: patch
        state: present

# Apply storage node patches
- name: Apply storage node patches
  hosts: storage
  become: true
  vars:
    patches:
      - name: "Container sharder always enabled"
        patch_file: "2_sharder.patch"
        target_dir: "/usr/lib/python3.9/site-packages/swift/container"
        patch_level: 0
        apply_when: true

  tasks:
    # Apply each patch (only if apply_when condition is true)
    - name: "Apply patch: {{ patch_item.name }}"
      ansible.builtin.include_tasks: apply_single_patch.yml
      vars:
        patch: "{{ patch_item }}"
      loop: "{{ patches | sort(attribute='patch_file') }}"
      loop_control:
        loop_var: patch_item
        label: "{{ patch_item.patch_file }}"
      when: patch_item.apply_when | default(true)
