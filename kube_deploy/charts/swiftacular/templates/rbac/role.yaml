apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: swiftacular-ring-publisher
  namespace: {{ include "swiftacular.namespace" . }}
  labels:
    {{- include "swiftacular.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps]
    # ring-builder Job's publish-rings container needs to create/update swift-rings
    verbs: [get, create, update, patch]
