apiVersion: v1
kind: Service
metadata:
  name: proxy-svc
  namespace: {{ include "swiftacular.namespace" . }}
  labels:
    app: proxy
    {{- include "swiftacular.labels" . | nindent 4 }}
spec:
  selector:
    app: proxy
  ports:
    - name: proxy
      port: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: proxy-nodeport
  namespace: {{ include "swiftacular.namespace" . }}
  labels:
    app: proxy
    {{- include "swiftacular.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: proxy
  ports:
    - name: proxy
      port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
