{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: {{ include "swiftacular.namespace" . }}
  labels:
    app: grafana
    {{- include "swiftacular.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: {{ include "swiftacular.namespace" . }}
  labels:
    app: grafana
    {{- include "swiftacular.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
{{- end }}
