apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: {{ include "swiftacular.namespace" . }}
  labels:
    app: mariadb
    {{- include "swiftacular.labels" . | nindent 4 }}
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swift-secrets
                  key: keystoneMysqlPassword
            - name: MYSQL_DATABASE
              value: keystone
            - name: MYSQL_USER
              value: keystone
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swift-secrets
                  key: keystoneMysqlPassword
          ports:
            - containerPort: 3306
              name: mysql
          readinessProbe:
            exec:
              command:
                - healthcheck.sh
                - --connect
                - --innodb_initialized
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - healthcheck.sh
                - --connect
                - --innodb_initialized
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.storage.storageClassName }}
        resources:
          requests:
            storage: 2Gi
