---
# Package installation
- name: Ensure chrony is installed
  ansible.builtin.dnf:
    name: chrony
    state: present
  become: true
  tags: [packages]

- name: Install SELinux Python bindings
  ansible.builtin.dnf:
    name: python3-libselinux
    state: present
  become: true
  tags: [packages]

# Configuration tasks
- name: Set timezone to UTC
  community.general.timezone:
    name: UTC
  tags: [configure]

- name: Enable cronyd on rhel8
  ansible.builtin.service:
    name: chronyd
    state: started
  tags: [configure]

- name: Print ansible_facts.interfaces
  ansible.builtin.debug:
    var: ansible_facts.interfaces
  tags: [configure]

- name: The network or subnet address from which the clients are allowed to connect.
  ansible.builtin.lineinfile:
    dest: /etc/chrony.conf
    line: "allow {{ ansible_ens6.ipv4.network }}"
  tags: [configure]
