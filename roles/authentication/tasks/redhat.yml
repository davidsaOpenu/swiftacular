---
# Configure authentication (Keystone)

# Repository setup (must run before package installation)
- name: Enable CRB (CodeReady Builder) repository
  ansible.builtin.command:
    cmd: dnf config-manager --enable crb
  become: true
  changed_when: true
  tags: [packages, configure]

- name: Install OpenStack Epoxy release package
  ansible.builtin.dnf:
    name: centos-release-openstack-epoxy
    state: present
  become: true
  tags: [packages, configure]

- name: Update all packages
  ansible.builtin.dnf:
    name: "*"
    state: present
    update_cache: true
    update_only: true
  become: true
  tags: [packages, configure]

# Package installation
- name: Install authentication packages
  ansible.builtin.dnf:
    name: "{{ authentication_redhat_packages }}"
    state: present
  become: true
  tags: [packages]

# Configuration tasks

- name: Start and enable MariaDB service
  ansible.builtin.systemd:
    name: mariadb
    state: started
    enabled: true
  become: true
  tags: [configure]

- name: Ensure keystone directories exist with correct permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - path: /etc/keystone
      mode: "0755"
    - path: /var/log/keystone
      mode: "0750"
  tags: [configure]

- name: Copy over /etc/keystone/logging.conf
  ansible.builtin.copy:
    src: redhat_logging.conf
    dest: /etc/keystone/logging.conf
    mode: "0640"
  notify: Restart keystone
  tags: [configure]

- name: Create empty /var/log/keystone/error.log and access.log
  ansible.builtin.command: "touch /var/log/keystone/{{ item }}.log"
  args:
    creates: "/var/log/keystone/{{ item }}.log"
  with_items:
    - error
    - access
  tags: [configure]

- name: Ensure error.log and access.log are writable by keystone
  ansible.builtin.file:
    path: /var/log/keystone/{{ item }}.log
    state: file
    mode: "0644"
  loop:
    - error
    - access
  tags: [configure]

- name: Ensure keystone can write to /var/log/keystone
  ansible.builtin.file:
    path: /var/log/keystone
    recurse: "yes"
  notify: Restart keystone
  tags: [configure]
